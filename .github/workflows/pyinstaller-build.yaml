name: Pyinstaller Builder

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild current version'
        required: false
        default: false
        type: boolean
        
jobs:
  pyinstaller-build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Create Executables
        uses: sayyid5416/pyinstaller@v1
        with:
          python_ver: '3.12'
          python_arch: ${{ runner.arch }}
          spec: 'main.py'
          requirements: 'requirements.txt'
          upload_exe_with_name: 'autoserve-ts'
          options: --onefile, --name "autoserve-ts-${{ runner.arch }}"
